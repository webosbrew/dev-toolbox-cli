name: Release

on:
  release:
    types: [ "published" ]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to create the release on (e.g. v20260626-cd038b0)'
        required: true
        type: string
      draft:
        description: 'Create the release as a draft for review before publishing'
        type: boolean
        default: true

jobs:
  release-ubuntu:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Update Packages
        shell: bash
        run: sudo apt-get -yq update

      - name: Use Rust Stable
        run: rustup toolchain install stable --profile minimal

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ runner.os }}

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build Packages
        run: |
          for f in packages/*; do
            cargo deb -p $(basename "$f") || exit 1
          done

      - name: Create Release (Ubuntu)
        id: create_release_ubuntu
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.event.release.tag_name || inputs.tag }}
          name: Release ${{ github.event.release.tag_name || inputs.tag }}
          draft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft }}
          allowUpdates: true
          omitNameDuringUpdate: true
          omitBodyDuringUpdate: true
          omitPrereleaseDuringUpdate: true
          artifacts: target/debian/*.deb
